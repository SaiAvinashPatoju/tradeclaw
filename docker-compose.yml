services:
  postgres:
    image: postgres:15
    container_name: tradeclaw-postgres
    environment:
      POSTGRES_USER: tradeclaw
      POSTGRES_PASSWORD: tradeclaw
      POSTGRES_DB: tradeclaw
    ports:
      - "5432:5432"
    volumes:
      - tradeclaw-postgres-data:/var/lib/postgresql/data
    networks:
      - tradeclaw-streaming

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: tradeclaw-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - tradeclaw-streaming

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: tradeclaw-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    networks:
      - tradeclaw-streaming

  spark-master:
    image: apache/spark:3.5.1
    container_name: tradeclaw-spark-master
    depends_on:
      - kafka
      - postgres
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master", "--host", "spark-master", "--port", "7077", "--webui-port", "8080"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://tradeclaw:tradeclaw@postgres:5432/tradeclaw
    volumes:
      - ./backend:/opt/tradeclaw/backend
      - ./scripts:/opt/tradeclaw/scripts
    ports:
      - "7077:7077"
      - "8080:8080"
      - "35000:35000"
      - "35001:35001"
    networks:
      - tradeclaw-streaming

  spark-worker-1:
    image: apache/spark:3.5.1
    container_name: tradeclaw-spark-worker-1
    depends_on:
      - spark-master
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077", "--webui-port", "8081", "--cores", "1", "--memory", "1g"]
    volumes:
      - ./backend:/opt/tradeclaw/backend
      - ./scripts:/opt/tradeclaw/scripts
    ports:
      - "8081:8081"
    networks:
      - tradeclaw-streaming

  spark-worker-2:
    image: apache/spark:3.5.1
    container_name: tradeclaw-spark-worker-2
    depends_on:
      - spark-master
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077", "--webui-port", "8081", "--cores", "1", "--memory", "1g"]
    volumes:
      - ./backend:/opt/tradeclaw/backend
      - ./scripts:/opt/tradeclaw/scripts
    ports:
      - "8082:8081"
    networks:
      - tradeclaw-streaming

  spark-worker-3:
    image: apache/spark:3.5.1
    container_name: tradeclaw-spark-worker-3
    depends_on:
      - spark-master
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077", "--webui-port", "8081", "--cores", "1", "--memory", "1g"]
    volumes:
      - ./backend:/opt/tradeclaw/backend
      - ./scripts:/opt/tradeclaw/scripts
    ports:
      - "8083:8081"
    networks:
      - tradeclaw-streaming

networks:
  tradeclaw-streaming:
    driver: bridge

volumes:
  tradeclaw-postgres-data:
